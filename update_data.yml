name: 股票数据自动更新（缓存版）

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 工作日 22:30（北京时间）自动运行
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write             # 仅用于提交 stock_list_bs.csv 等小文件

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 恢复数据缓存
        uses: actions/cache@v3
        with:
          path: ./data_bs_cycle
          key: stock-data-cache-v1
          restore-keys: |
            stock-data-cache-

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install pandas numpy baostock

      - name: 执行数据更新
        run: python stock_updater.py --update

      - name: 提交更新到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_list_bs.csv
          git commit -m "自动更新股票列表 $(date +'%Y-%m-%d')" || echo "无变化"
          git push origin main